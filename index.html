<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<script src="coi-serviceworker.js"></script>
<title>검과 마법의 텍스트 RPG</title>
<style>
  :root{
    --bg:#0e1015; --panel:#171a22; --panel2:#1f2330; --ink:#e8e6df;
    --gold:#e8c172; --gold-d:#b8923f; --line:#2c3142;
    --red:#ff5c5c; --green:#6bd968; --yellow:#ffd95c; --blue:#6aa8ff;
    --magenta:#d18bff; --cyan:#5fe3e3; --gray:#8a8f9c;
    --hp:#ff5c5c;        /* HP = 빨강 */
    --mp:#4f8dff;        /* MP = 파랑 */
    --xp:#d18bff;        /* XP = 보라 */
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(120% 90% at 50% -10%, #1a1f2e 0%, var(--bg) 60%) fixed;
    color:var(--ink);
    font-family:"D2Coding","Cascadia Code","Consolas","Noto Sans KR",ui-monospace,monospace;
    display:flex;align-items:center;justify-content:center;
    padding:16px;min-height:100%;
  }
  .frame{
    width:100%;max-width:720px;background:var(--panel);
    border:1px solid var(--line);border-radius:16px;
    box-shadow:0 20px 60px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.02);
    overflow:hidden;display:flex;flex-direction:column;max-height:94vh;
  }
  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:10px 14px;background:linear-gradient(180deg,#20283a,#1a2030);
    border-bottom:1px solid var(--line);
  }
  .brand{font-weight:700;color:var(--gold);letter-spacing:.5px;font-size:14px}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);
    box-shadow:0 0 8px var(--green);margin-right:6px;vertical-align:middle}
  .dot.busy{background:var(--yellow);box-shadow:0 0 8px var(--yellow);animation:pulse 1s infinite}
  .dot.dead{background:var(--gray);box-shadow:none}
  @keyframes pulse{50%{opacity:.3}}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--gray);
    border-radius:8px;padding:5px 10px;font:inherit;font-size:12px;cursor:pointer}
  .btn-ghost:hover{color:var(--ink);border-color:var(--gold-d)}

  .viewport{flex:1;overflow:auto;padding:18px 16px 6px;scrollbar-width:thin}
  .stage{transition:opacity .14s ease, transform .14s ease}
  .stage.out{opacity:0;transform:translateY(10px)}
  .stage.in{opacity:1;transform:none}
  pre.line{margin:0;white-space:pre-wrap;word-break:break-word;
    font-size:14px;line-height:1.55;letter-spacing:.1px}
  b{font-weight:700}

  /* 구분선: 글자(─×48)가 줄바꿈되며 깨지던 문제 → 진짜 가로줄로 */
  hr.div{border:none;border-top:1px solid var(--line);margin:9px 0;opacity:.7}
  hr.div.strong{border-top:1px solid var(--gold-d);opacity:.55}

  /* HP/MP/XP 바 */
  .hp-panel{margin:0 0 10px}
  .bar{margin:7px 0;display:flex;align-items:center;gap:10px}
  .bar .tag{width:30px;font-size:12px;font-weight:700;color:var(--gray);flex:none;text-align:right}
  .bar .track{flex:1;height:16px;background:#0c0e14;border:1px solid var(--line);
    border-radius:8px;overflow:hidden;position:relative}
  .bar .fill{height:100%;width:0;border-radius:7px;
    transition:width .55s cubic-bezier(.22,.61,.36,1), background-color .4s;}
  .bar .num{font-size:12px;color:var(--ink);min-width:74px;flex:none}
  .bar .extra{font-size:12px;color:var(--gray)}

  /* 전투 패널 */
  .combat .combat-log{border-top:1px dashed var(--line);padding-top:8px;margin-top:2px}

  .controls{border-top:1px solid var(--line);background:linear-gradient(180deg,#161a24,#12151d);
    padding:12px 14px 16px}
  .prompt{font-size:12px;color:var(--gray);margin:0 2px 10px;min-height:14px}
  .opts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .opt{flex:1 1 auto;min-width:120px;background:var(--panel2);color:var(--ink);
    border:1px solid var(--line);border-radius:10px;padding:11px 12px;font:inherit;
    font-size:14px;text-align:left;cursor:pointer;transition:.12s;display:flex;gap:8px;align-items:center}
  .opt:hover{border-color:var(--gold-d);background:#262b3a;transform:translateY(-1px)}
  .opt:active{transform:translateY(0)}
  .opt .k{display:inline-flex;width:22px;height:22px;flex:none;align-items:center;justify-content:center;
    background:var(--gold);color:#1a1206;border-radius:6px;font-weight:700;font-size:12px}
  .opt.primary{background:linear-gradient(180deg,#2a3550,#222a40);border-color:var(--gold-d)}
  .opt.yes .k{background:var(--green);color:#06210a}
  .opt.no  .k{background:var(--red);color:#280606}
  .opt.cont{justify-content:center}
  .opt.cont .k{background:var(--cyan);color:#04211f}
  .inputrow{display:flex;gap:8px}
  .inputrow input{flex:1;background:#0c0e14;border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:11px 12px;font:inherit;font-size:14px;outline:none}
  .inputrow input:focus{border-color:var(--gold-d)}
  .inputrow button{background:var(--gold);color:#1a1206;border:none;border-radius:10px;
    padding:0 18px;font:inherit;font-weight:700;cursor:pointer}
  .inputrow button:disabled{opacity:.4;cursor:default}
  .controls.disabled{opacity:.45;pointer-events:none}
  .ended{color:var(--gold);text-align:center;font-weight:700;padding:6px 0 12px}
  .hint{color:var(--gray);font-size:11px;text-align:center;margin-top:8px}

  html,body{height:100dvh}
  .frame{max-height:100svh;max-height:100dvh;border-radius:14px}
  *{-webkit-tap-highlight-color:transparent}
  body{padding:max(8px,env(safe-area-inset-top)) 10px max(8px,env(safe-area-inset-bottom))}
  .opt{min-height:46px}
  .inputrow input,.inputrow button{min-height:46px}
  code{background:#0c0e14;border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:12px}
</style>
</head>
<body>
  <div class="frame">
    <div class="topbar">
      <div class="brand">⚔ 검과 마법의 텍스트 RPG</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="status"><span class="dot" id="statusdot"></span><span id="statustxt" style="font-size:12px;color:var(--gray)">연결 중…</span></span>
        <button class="btn-ghost" id="resetBtn">새 게임</button>
      </div>
    </div>

    <div class="viewport" id="viewport">
      <div class="stage in" id="stage"></div>
    </div>

    <div class="controls" id="controls">
      <div class="prompt" id="prompt"></div>
      <div class="opts" id="opts"></div>
      <div class="inputrow">
        <input id="textin" type="text" autocomplete="off" placeholder="여기에 입력…">
        <button id="sendBtn">보내기</button>
      </div>
      <div class="hint">메뉴는 버튼을 누르거나 키보드 숫자/문자로 입력할 수 있어요.</div>
    </div>
  </div>

<script>
const ANSI={'31':'var(--red)','32':'var(--green)','33':'var(--yellow)','34':'var(--blue)',
  '35':'var(--magenta)','36':'var(--cyan)','37':'var(--ink)','90':'var(--gray)'};
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansiToHtml(text){
  let out='',color='',bold=false,dim=false;
  const parts=text.split(/\x1b\[([0-9;]*)m/);
  for(let i=0;i<parts.length;i++){
    if(i%2===1){
      for(const code of parts[i].split(';')){
        if(code===''||code==='0'){color='';bold=false;dim=false;}
        else if(code==='1')bold=true; else if(code==='2')dim=true;
        else if(ANSI[code])color=ANSI[code];
      }
    }else if(parts[i]){
      let st=''; if(color)st+='color:'+color+';'; if(bold)st+='font-weight:700;'; if(dim)st+='opacity:.6;';
      out+= st?`<span style="${st}">${esc(parts[i])}</span>`:esc(parts[i]);
    }
  }
  return out;
}
function stripAnsi(s){return s.replace(/\x1b\[[0-9;]*m/g,'');}

const BAR_RE=/^(\s*)(HP|MP|XP)\s+([\u2588\u2591]+)\s+(\d+)\s*\/\s*(\d+)(.*)$/;
const DIV_RE=/^[\u2500\u2550\u2014\u2013\-=\u00b7_\uff3f\u2022\u2501\u2504\u2508\s]+$/;
function isDivider(plain){const t=plain.trim();return t.length>=3 && DIV_RE.test(t) && /[\u2500\u2550\u2014\u2013\-=\u00b7_]/.test(t);}
function parseBar(plain){
  const m=plain.match(BAR_RE); if(!m) return null;
  const label=m[2],cur=+m[4],mx=+m[5],extra=(m[6]||'').trim();
  const pct=mx>0?Math.max(0,Math.min(1,cur/mx)):0;
  return {label,cur,mx,extra,pct};
}
function isOptionLine(plain){return /^\s*[0-9A-Za-z]\)\s/.test(plain);}

let lastPct={};
function barEl(bar,idx,prefix){
  const key=prefix+bar.label+'#'+idx;
  const color=bar.label==='HP'?'var(--hp)':(bar.label==='MP'?'var(--mp)':'var(--xp)');
  const prev=(key in lastPct)?lastPct[key]:bar.pct;
  const el=document.createElement('div');el.className='bar';
  el.innerHTML=
    `<span class="tag">${bar.label}</span>`+
    `<span class="track"><span class="fill" data-pct="${bar.pct}" `+
    `style="width:${(prev*100).toFixed(1)}%;background:${color}"></span></span>`+
    `<span class="num">${bar.cur} / ${bar.mx}</span>`+
    (bar.extra?`<span class="extra">${esc(bar.extra)}</span>`:``);
  lastPct[key]=bar.pct;
  return el;
}
function animateBars(root){
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    root.querySelectorAll('.fill').forEach(f=>{f.style.width=(parseFloat(f.dataset.pct)*100).toFixed(1)+'%';});
  }));
}

function classify(screen){
  const out=[];
  for(const raw of (screen||'').replace(/\r/g,'').split('\n')){
    const plain=stripAnsi(raw);
    const bar=parseBar(plain);
    if(bar){out.push({k:'bar',bar});continue;}
    if(plain.trim()===''){out.push({k:'blank'});continue;}
    if(isDivider(plain)){out.push({k:'div',strong:/\u2550/.test(plain)});continue;}
    out.push({k:'text',raw,plain});
  }
  while(out.length&&(out[0].k==='blank'||out[0].k==='div'))out.shift();
  while(out.length&&(out[out.length-1].k==='blank'||out[out.length-1].k==='div'))out.pop();
  return out;
}

// 일반(마을·상점 등) 화면
function buildNormal(items){
  const wrap=document.createElement('div');let buf=[];const cnt={};
  const flush=()=>{if(!buf.length)return;const pre=document.createElement('pre');pre.className='line';
    pre.innerHTML=buf.join('\n');wrap.appendChild(pre);buf=[];};
  for(const it of items){
    if(it.k==='bar'){flush();const i=(cnt[it.bar.label]=(cnt[it.bar.label]||0)+1)-1;wrap.appendChild(barEl(it.bar,i,'n'));}
    else if(it.k==='div'){flush();const hr=document.createElement('hr');hr.className='div'+(it.strong?' strong':'');wrap.appendChild(hr);}
    else if(it.k==='blank'){buf.push('');}
    else buf.push(ansiToHtml(it.raw));
  }
  flush();return wrap;
}

// 전투 화면: HP 바(상단, 제자리 갱신) + 로그(행동/피해) — 행동해도 창이 안 넘어감
let lastBars=[];
function buildCombat(items){
  let bars=items.filter(it=>it.k==='bar').map(it=>it.bar);
  if(bars.length)lastBars=bars; else bars=lastBars;
  const wrap=document.createElement('div');wrap.className='combat';
  const hp=document.createElement('div');hp.className='hp-panel';
  bars.forEach((b,i)=>hp.appendChild(barEl(b,i,'c')));
  wrap.appendChild(hp);
  const logLines=[];
  for(const it of items){ if(it.k==='text'&&!isOptionLine(it.plain)) logLines.push(it.raw); }
  if(logLines.length){
    const log=document.createElement('div');log.className='combat-log';
    const pre=document.createElement('pre');pre.className='line';
    pre.innerHTML=logLines.map(ansiToHtml).join('\n');
    log.appendChild(pre);wrap.appendChild(log);
  }
  return wrap;
}

function parseOptions(screen){
  const opts=[];const seen=new Set();
  for(const line of stripAnsi(screen).split('\n')){
    const re=/(?:^|\s)([0-9A-Za-z])\)\s/g;let mm;const marks=[];
    while((mm=re.exec(line))!==null){marks.push({key:mm[1],at:re.lastIndex});}
    for(let i=0;i<marks.length;i++){
      const end=(i+1<marks.length)?line.lastIndexOf(marks[i+1].key+')',marks[i+1].at):line.length;
      let label=line.slice(marks[i].at,end<0?line.length:end).trim().replace(/\s{2,}.*$/,'');
      if(!label)label=marks[i].key;
      if(seen.has(marks[i].key))continue;
      seen.add(marks[i].key);opts.push({key:marks[i].key,label});
    }
  }
  return opts;
}

// ── 상태 / 통신:  Pyodide 워커  +  SharedArrayBuffer 입력 다리 ──
const stage=document.getElementById('stage'),viewport=document.getElementById('viewport');
const promptEl=document.getElementById('prompt'),optsEl=document.getElementById('opts');
const textin=document.getElementById('textin'),sendBtn=document.getElementById('sendBtn');
const controls=document.getElementById('controls');
const statusdot=document.getElementById('statusdot'),statustxt=document.getElementById('statustxt');
let currentOpts=[];
let inCombat=false,prevCombat=false,uiCombat=false;
let busy=true, ended=false;          // busy: 게임이 다음 화면 계산 중

// SharedArrayBuffer 레이아웃:  CTRL[0]=세대 카운터, CTRL[1]=입력 길이, 그 뒤=UTF-8 입력
const DATA_LEN=2048;
let SAB=null, CTRL=null, DATA=null, worker=null;
const ENC=new TextEncoder();

function showFatal(html){
  stage.innerHTML='<div style="padding:8px 2px;line-height:1.7">'+html+'</div>';
  controls.classList.add('disabled');
  statustxt.textContent='실행 불가'; statusdot.className='dot dead';
}

function bootEngine(){
  if(!self.crossOriginIsolated || typeof SharedArrayBuffer==='undefined'){
    showFatal(
      '<b style="color:var(--gold)">브라우저 격리(cross-origin isolation)가 꺼져 있어 실행할 수 없어요.</b><br><br>'+
      '이 게임은 파이썬을 브라우저 안에서 돌리려고 <code>SharedArrayBuffer</code>를 쓰는데, '+
      '그러려면 페이지가 <code>https</code>(또는 <code>localhost</code>)에서 특별한 헤더와 함께 제공돼야 합니다.<br><br>'+
      '• <b>GitHub Pages</b>에 올리면 동봉된 <code>coi-serviceworker.js</code>가 자동으로 처리합니다(첫 접속 시 한 번 새로고침).<br>'+
      '• 로컬 테스트는 <code>python serve.py</code> 로 띄운 뒤 <code>http://localhost:8000</code> (크롬 권장).<br>'+
      '• 파일을 더블클릭해 <code>file://</code> 로 여는 방식은 동작하지 않습니다.'
    );
    return;
  }
  SAB=new SharedArrayBuffer(8+DATA_LEN);
  CTRL=new Int32Array(SAB,0,2);
  DATA=new Uint8Array(SAB,8,DATA_LEN);

  let saveData=null;
  try{ saveData=localStorage.getItem('rpg_save'); }catch(_){}

  worker=new Worker('worker.js');
  worker.onmessage=(e)=>{
    const m=e.data;
    if(m.type==='loading'){ statustxt.textContent=m.text||'불러오는 중…'; }
    else if(m.type==='ready'){ /* 게임 스레드 시작됨 */ }
    else if(m.type==='screen'){
      busy=false; ended=!!m.ended;
      render({screen:m.screen, prompt:m.prompt, ended:ended, waiting:!ended, processing:false});
      setStatus();
    }
    else if(m.type==='save'){ try{ localStorage.setItem('rpg_save', m.data); }catch(_){} }
    else if(m.type==='error'){ showFatal('<b style="color:var(--red)">엔진 오류</b><br><br>'+esc(m.message)); }
  };
  worker.onerror=(e)=>showFatal('<b style="color:var(--red)">워커 로드 실패</b><br><br>'+esc(e.message||String(e)));
  worker.postMessage({type:'init', sab:SAB, dataLen:DATA_LEN, saveData:saveData});
}

// 입력 전송: SAB에 써넣고 세대 카운터를 올려 워커의 Atomics.wait 를 깨운다
function send(value){
  if(busy||ended||!CTRL) return;
  busy=true; controls.classList.add('disabled'); setStatus();
  const bytes=ENC.encode(String(value));
  const n=Math.min(bytes.length, DATA_LEN);
  DATA.set(bytes.subarray(0,n));
  Atomics.store(CTRL,1,n);
  Atomics.add(CTRL,0,1);
  Atomics.notify(CTRL,0);
  textin.value='';
}

function addOpt(key,label,cls,fn){
  const b=document.createElement('button');b.className=cls;
  b.innerHTML=(key!==''?`<span class="k">${esc(key)}</span>`:'')+`<span>${esc(label)}</span>`;
  b.onclick=fn;optsEl.appendChild(b);
}
function renderControls(st){
  promptEl.textContent=stripAnsi(st.prompt||'');
  optsEl.innerHTML='';currentOpts=[];
  const p=st.prompt||'';
  const waiting=st.waiting&&!st.processing&&!st.ended;
  if(st.ended){controls.classList.add('disabled');
    promptEl.innerHTML='<span class="ended">― 게임 종료 ―  위 \'새 게임\'으로 다시 시작 ―</span>';return;}
  const isPause=/\[Enter\]/.test(p), isYesNo=/\(y\/n\)/i.test(p);
  const menu=parseOptions(st.screen);
  if(isPause) addOpt('','계속 ▶','opt primary cont',()=>send(''));
  if(isYesNo){addOpt('y','예 (Yes)','opt yes',()=>send('y'));addOpt('n','아니오 (No)','opt no',()=>send('n'));}
  if(!isPause){for(const o of menu){currentOpts.push(o.key.toLowerCase());addOpt(o.key,o.label,'opt',()=>send(o.key));}}
  const showText = !isPause && !(uiCombat && menu.length);
  textin.parentElement.style.display=showText?'flex':'none';
  controls.classList.toggle('disabled',!waiting);
  sendBtn.disabled=!waiting;
  if(waiting&&showText&&!menu.length&&!isYesNo)setTimeout(()=>textin.focus(),50);
}
function setStatus(){
  statusdot.className='dot'+(ended?' dead':(busy?' busy':''));
  statustxt.textContent=ended?'종료됨':(busy?'진행 중…':'입력 대기');
}
function mountStage(node,flip){
  if(flip){
    stage.classList.remove('in');stage.classList.add('out');
    setTimeout(()=>{stage.innerHTML='';stage.appendChild(node);
      stage.classList.remove('out');stage.classList.add('in');animateBars(stage);viewport.scrollTop=0;},140);
  }else{
    stage.innerHTML='';stage.appendChild(node);animateBars(stage);
  }
}
function render(st){
  const items=classify(st.screen||'');
  const plain=stripAnsi(st.screen||'');
  const hasBars=items.some(it=>it.k==='bar');
  const hasMenu=plain.includes('공격')&&plain.includes('스킬')&&plain.includes('도망');
  const endKw=/(쓰러뜨렸다|토벌했다|GAME OVER|당신은 쓰러졌다|무사히 도망)/.test(plain);
  let combatNow;
  if(!inCombat){combatNow=hasBars&&hasMenu;if(combatNow)inCombat=true;}
  else combatNow=true;
  if(combatNow){
    const ending=inCombat&&endKw;
    if(ending && /쓰러뜨렸다|토벌했다/.test(plain) && lastBars.length){
      lastBars=lastBars.map((b,i)=> i===0 ? {label:b.label,cur:0,mx:b.mx,extra:b.extra,pct:0} : b);
    }
    uiCombat=true;
    const node=buildCombat(items);
    mountStage(node, !prevCombat);
    prevCombat = !ending;
    if(ending)inCombat=false;
  }else{
    uiCombat=false;prevCombat=false;
    mountStage(buildNormal(items), true);
  }
  renderControls(st);
}

sendBtn.onclick=()=>{if(!sendBtn.disabled)send(textin.value);};
textin.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();if(!sendBtn.disabled)send(textin.value);}});
document.addEventListener('keydown',e=>{
  if(document.activeElement===textin||busy||ended)return;
  if(e.key==='Enter'){const c=optsEl.querySelector('.cont');if(c)c.click();return;}
  const k=e.key.toLowerCase();
  for(const b of optsEl.querySelectorAll('.opt')){
    const kk=b.querySelector('.k');if(kk&&kk.textContent.toLowerCase()===k){b.click();return;}
  }
});
document.getElementById('resetBtn').onclick=()=>{
  if(!confirm('새 게임을 시작할까요? 저장된 기록이 지워집니다.'))return;
  try{ localStorage.removeItem('rpg_save'); }catch(_){}
  if(worker){ worker.terminate(); }
  lastPct={};lastBars=[];inCombat=false;prevCombat=false;uiCombat=false;ended=false;busy=true;
  stage.innerHTML='<pre class="line" style="opacity:.7">새 게임을 준비하는 중…</pre>';
  bootEngine();
};
